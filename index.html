<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROI Compass | Dashboard</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <span>📊 ROI Compass</span>
      </div>
      <nav>
        <ul>
          <li><a href="index.html" class="active">Dashboard</a></li>
          <li><a href="campaigns.html">Campaigns</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>

      <div class="theme-toggle">
        <button id="darkModeToggle" aria-label="Toggle dark mode">🌓 Dark Mode</button>
      </div>
    </aside>

    <main class="main-content" id="dashboardReport">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>ROI Dashboard</h1>
        <button id="reportBtn" class="primary-btn">📊 Generate Professional Report</button>
      </div>
      
      <div class="metrics-grid">
        <div class="metric-card" id="cardCPC">
          <h3>Cost Per Click (CPC)</h3>
          <div class="metric-value" id="cpcValue">$0.00</div>
        </div>
        <div class="metric-card" id="cardCPL">
          <h3>Cost Per Lead (CPL)</h3>
          <div class="metric-value" id="cplValue">$0.00</div>
        </div>
        <div class="metric-card">
          <h3>Total Leads</h3>
          <div class="metric-value" id="leadsValue">0</div>
        </div>
      </div>

      <div class="form-card">
        <h2>Campaign Inputs</h2>
        <div class="input-group">
          <label for="budget">Budget ($)</label>
          <input type="number" id="budget" placeholder="e.g., 1000" step="any">
        </div>
        <div class="input-group">
          <label for="clicks">Clicks</label>
          <input type="number" id="clicks" placeholder="e.g., 5000" step="any">
        </div>
        <div class="input-group">
          <label for="convRate">Conversion Rate (%)</label>
          <input type="number" id="convRate" placeholder="e.g., 2.5" step="any">
        </div>
        <button id="calculateBtn" class="primary-btn">Calculate ROI</button>
        <button id="saveCampaignBtn" class="secondary-btn">💾 Save Campaign</button>
      </div>

      <div class="form-card" style="margin-top: 2rem;">
        <h2>SEO Preview Tool</h2>
        <div class="input-group">
          <label for="seoTitle">SEO Title</label>
          <input type="text" id="seoTitle" placeholder="Campaign Title (max 60 chars)" maxlength="60">
        </div>
        <div class="input-group">
          <label for="seoDesc">Meta Description</label>
          <textarea id="seoDesc" rows="2" placeholder="Describe your campaign (max 160 chars)" maxlength="160"></textarea>
        </div>
        
        <div class="seo-snippet">
          <div class="snippet-title" id="snippetTitle">Your SEO Title</div>
          <div class="snippet-url">https://roicompass.com/</div>
          <div class="snippet-desc" id="snippetDesc">Your meta description will appear here.</div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/calculations.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/storage.js"></script>
</body>
</html>
